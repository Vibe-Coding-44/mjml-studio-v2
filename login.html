<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Login — Email Studio V2</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #F8F6FF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      background: #fff;
      border: 1px solid rgba(108,71,255,.12);
      border-radius: 16px;
      padding: 40px 36px;
      width: 340px;
      box-shadow: 0 8px 40px rgba(108,71,255,.10);
      text-align: center;
    }
    .logo { font-size: 28px; font-weight: 800; color: #1A1033; margin-bottom: 4px; }
    .sub  { font-size: 13px; color: #9B8EC4; margin-bottom: 32px; }
    label { display: block; font-size: 11px; font-weight: 700; color: #7A6E9A;
            text-align: left; margin-bottom: 6px; letter-spacing: .04em; }
    input[type=password] {
      width: 100%; padding: 10px 14px; border-radius: 10px;
      border: 1.5px solid rgba(108,71,255,.18); font-size: 15px;
      outline: none; transition: border-color .15s;
      color: #1A1033; background: #fff;
    }
    input[type=password]:focus { border-color: #6C47FF; }
    .btn {
      margin-top: 20px; width: 100%; padding: 12px;
      background: #6C47FF; color: #fff; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 700; cursor: pointer; transition: background .15s;
    }
    .btn:hover { background: #7C5DFA; }
    .btn:disabled { opacity: .5; cursor: default; }
    .error {
      margin-top: 14px; font-size: 12px; color: #E53E3E;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📧 Email Studio</div>
    <div class="sub">V2 — Private Access</div>
    <label for="pw">パスワード</label>
    <input type="password" id="pw" placeholder="••••••••••••" autofocus>
    <button class="btn" id="btn-login">ログイン</button>
    <div class="error" id="error"></div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // すでに認証済みなら即リダイレクト
    if (sessionStorage.getItem(AUTH_KEY) === '1') location.replace('index.html');

    const btn = document.getElementById('btn-login');
    const pw  = document.getElementById('pw');
    const err = document.getElementById('error');

    async function attempt() {
      btn.disabled = true;
      err.textContent = '';
      const hash = await sha256(pw.value);
      if (hash === AUTH_HASH) {
        sessionStorage.setItem(AUTH_KEY, '1');
        location.replace('index.html');
      } else {
        err.textContent = 'パスワードが違います';
        pw.value = '';
        pw.focus();
        btn.disabled = false;
      }
    }

    btn.addEventListener('click', attempt);
    pw.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });
  </script>
</body>
</html>
