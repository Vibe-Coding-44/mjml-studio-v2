<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Studio V2 — 管理画面</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <header class="db-header">
    <div class="db-header__brand">📧 Email Studio V2</div>
    <nav class="db-tabs">
      <button class="db-tab db-tab--active" data-tab="templates">テンプレート</button>
      <button class="db-tab" data-tab="assets">アセットライブラリ</button>
    </nav>
    <button id="btn-new" class="db-btn db-btn--primary">+ 新規作成</button>
    <button onclick="logout()" class="db-btn db-btn--ghost" style="font-size:12px;padding:5px 10px;">ログアウト</button>
  </header>

  <!-- テンプレート一覧 -->
  <div id="tab-templates" class="db-main">
    <div class="db-toolbar">
      <input id="search-input" type="text" class="db-search" placeholder="テンプレートを検索...">
      <select id="status-filter" class="db-select">
        <option value="">すべて</option>
        <option value="draft">下書き</option>
        <option value="complete">完了</option>
      </select>
      <span id="db-count" class="db-count"></span>
    </div>

    <div id="card-grid" class="db-grid"></div>
    <div id="db-empty" class="db-empty hidden">
      <p class="db-empty__text">テンプレートがありません</p>
      <button class="db-btn db-btn--primary" id="btn-new2">+ 最初のテンプレートを作成</button>
    </div>
  </div>

  <!-- アセットライブラリ -->
  <div id="tab-assets" class="db-main hidden">
    <div class="db-toolbar">
      <span class="db-assets-note">CDN URL をコピーして、エディタの画像URL欄に貼り付けてください。</span>
      <a class="db-btn db-btn--ghost" href="https://github.com/Vibe-Coding-44/mjml-studio-v2/upload/main/assets/images" target="_blank">↑ 画像をアップロード</a>
    </div>
    <div id="assets-container" class="db-assets-container">読み込み中…</div>
  </div>

  <!-- Template Picker Modal -->
  <div id="picker-overlay" class="picker-overlay hidden">
    <div class="picker-modal">
      <div class="picker-header">
        <span class="picker-title">テンプレートを選択</span>
        <button id="picker-close" class="picker-close">✕</button>
      </div>
      <div id="picker-grid" class="picker-grid"></div>
    </div>
  </div>

  <!-- Context Menu -->
  <div id="ctx-menu" class="ctx-menu hidden">
    <button class="ctx-item" data-action="edit">✏️ 編集</button>
    <button class="ctx-item" data-action="duplicate">📋 複製</button>
    <button class="ctx-item" data-action="export">⬇️ HTML 書き出し</button>
    <hr class="ctx-divider">
    <button class="ctx-item ctx-item--danger" data-action="delete">🗑️ 削除</button>
  </div>

  <script src="js/auth.js"></script>
  <script>requireAuth();</script>
  <script src="https://unpkg.com/mjml-browser@4/lib/index.js"></script>
  <script src="js/icon_data.js"></script>
<script src="js/store.js"></script>
  <script src="js/components.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/templates.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/assets.js"></script>
</body>
</html>
